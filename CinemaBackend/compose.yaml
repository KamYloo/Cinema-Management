services:
  nginx:
    image: 'nginx:latest'
    container_name: 'cinemaReverseProxy'
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - cinema-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 'cinemaBackend'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cinemaData
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=netlab
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    networks:
      - cinema-network

  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=cinemaData'
      - 'POSTGRES_PASSWORD=netlab'
      - 'POSTGRES_USER=postgres'
    container_name: 'cinemaDatabase'
    ports:
      - '5432:5432'
    networks:
      - cinema-network

  minio:
    image: 'minio/minio:latest'
    container_name: 'cinemaFileStorage'
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: minio server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    networks:
      - cinema-network

  minio-init:
    image: minio/mc:latest
    container_name: 'cinemaFileStorageInit'
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin123; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb -p local/cinema-uploads || true;
      mc anonymous set download local/cinema-uploads;
      exit 0;
      "
    networks:
      - cinema-network

networks:
  cinema-network:
    driver: bridge

volumes:
  minio_data:
